<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KO MAG — En Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">

<style>
:root {
    --red: #E8001A;
    --dark: #0A0A0B;
    --white: #FAFAFA;
}

body, html { 
    margin: 0; 
    padding: 0; 
    width: 100%; 
    height: 100%; 
    background: var(--dark); 
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
}

.construction-container {
    text-align: center;
    color: var(--white);
    z-index: 10;
    max-width: 90%;
}

/* LE NOUVEAU LOGO SVG GANT + ÉCLAIRS */
.logo-svg {
    width: clamp(150px, 20vw, 250px); /* Adaptatif */
    height: auto;
    margin-bottom: 30px;
    filter: drop-shadow(0 0 20px rgba(232, 0, 26, 0.5));
    animation: impactPulse 2s infinite ease-in-out;
}

@keyframes impactPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(232, 0, 26, 0.5)); }
    50% { transform: scale(1.03); filter: drop-shadow(0 0 35px rgba(232, 0, 26, 0.8)); }
}

h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 8rem);
    line-height: 0.8;
    margin: 0;
    letter-spacing: 2px;
    text-transform: uppercase;
}

h1 span { color: var(--red); }

.status-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    padding: 5px 20px;
    font-size: 1.2rem;
    letter-spacing: 5px;
    margin-top: 15px;
    font-weight: bold;
    text-transform: uppercase;
}

p {
    margin-top: 25px;
    font-size: 1.3rem;
    opacity: 0.7;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* Masquage de l'ancien site */
#original-site-content { display: none; }
</style>
</head>
<body>

    <div class="construction-container">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <polygon id="lightning" points="0,0 10,0 5,10 15,10 0,25" fill="#FAFAFA"/>
            </defs>

            <rect x="15" y="70" width="20" height="15" rx="2" fill="#E8001A"/>
            <path d="M20 75 L30 75 M20 80 L30 80" stroke="#FAFAFA" stroke-width="1"/>
            
            <path d="M35 75 
                     C35 60, 45 45, 60 45 
                     C80 45, 90 55, 90 70 
                     C90 85, 80 95, 60 95 
                     C45 95, 35 85, 35 75 Z" fill="#E8001A"/>
            
            <path d="M40 70 C40 60, 50 55, 55 60 C55 65, 50 75, 40 75 Z" fill="#E8001A" stroke="#0A0A0B" stroke-width="1"/>

            <use href="#lightning" x="70" y="20" transform="scale(1.2) rotate(-10 70 20)"/>
            <use href="#lightning" x="10" y="10" transform="scale(0.8) rotate(15 10 10)"/>
            <use href="#lightning" x="80" y="60" transform="scale(0.6) rotate(-30 80 60)"/>
        </svg>

        <h1>KO <span>MAG</span></h1>
        <div class="status-tag">En Construction</div>
        <p>PRE-FIGHT PREPARATION</p>
    </div>

    <div id="original-site-content">
        </div>

</body>
</html>
