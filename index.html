<style>
:root{--red:#E8001A;--dark:#0A0A0B;--white:#FAFAFA}
body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); overflow-x: hidden; }

/* ÉCRAN DE CONSTRUCTION */
.construction-screen {
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--dark);
    color: var(--white);
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
}

.construction-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    line-height: 0.9;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.construction-screen h1 span { color: var(--red); }

.construction-screen p {
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    opacity: 0.8;
}

.boxing-loader {
    width: 50px;
    height: 50px;
    border: 3px solid var(--red);
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 1s linear infinite;
    margin-bottom: 30px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* MASQUAGE DU SITE ORIGINAL */
#original-site-content { display: none !important; }
</style>

<body>

    <div class="construction-screen">
        <div class="boxing-loader"></div>
        <h1>KO <span>MAG</span><br>EN CONSTRUCTION</h1>
        <p>Prochain round imminent</p>
    </div>

    <div id="original-site-content">
        <header>
            <div class="header-top">
                <a href="#" class="logo">KO <span>MAG</span> <span class="logo-badge">LIVE</span></a>
            </div>
        </header>
        </div>

</body>
