<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KO MAG — En Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">

<style>
:root {
    --red: #E8001A;
    --dark: #0A0A0B;
    --white: #FAFAFA;
}

body, html { 
    margin: 0; 
    padding: 0; 
    width: 100%; 
    height: 100%; 
    background: var(--dark); 
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.construction-container {
    text-align: center;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    z-index: 10;
}

/* LE LOGO SVG */
.logo-svg {
    width: 180px;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 15px rgba(232, 0, 26, 0.4));
    animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
}

h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 6rem);
    line-height: 0.85;
    margin: 0;
    letter-spacing: 2px;
    text-transform: uppercase;
}

h1 span { color: var(--red); }

.status-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    padding: 4px 15px;
    font-size: 1rem;
    letter-spacing: 4px;
    margin-top: 15px;
    font-weight: bold;
    text-transform: uppercase;
}

p {
    margin-top: 20px;
    font-size: 1.1rem;
    opacity: 0.6;
    letter-spacing: 2px;
}

/* Masquage de l'ancien site */
#original-site-content { display: none; }
</style>
</head>
<body>

    <div class="construction-container">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#E8001A" stroke-width="2" stroke-dasharray="4 2"/>
            <path d="M35 45 C35 35 45 30 50 35 C55 30 65 35 65 45 C65 55 55 65 50 65 C45 65 35 55 35 45" fill="#E8001A"/>
            <rect x="42" y="62" width="16" height="8" rx="2" fill="#FAFAFA"/>
            <path d="M20 30 L30 40 L25 45" stroke="#FAFAFA" stroke-width="2" fill="none"/>
            <path d="M80 30 L70 40 L75 45" stroke="#FAFAFA" stroke-width="2" fill="none"/>
        </svg>

        <h1>KO <span>MAG</span></h1>
        <div class="status-tag">En Construction</div>
        <p>RE-PRÉPARATION PHYSIQUE DU SITE</p>
    </div>

    <div id="original-site-content">
        </div>

</body>
</html>
